<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUITCASE AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .card { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); overflow: hidden; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 30px; text-align: center; }
    .header h1 { font-size: 36px; font-weight: 700; margin-bottom: 10px; }
    .header p { font-size: 16px; opacity: 0.9; }
    .lang-btn { position: absolute; top: 20px; right: 20px; background: white; color: #667eea; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .content { padding: 40px; }
    .section { margin-bottom: 30px; }
    .section h2 { font-size: 20px; color: #333; margin-bottom: 15px; font-weight: 600; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .btn-type { padding: 16px; border: 2px solid #e0e0e0; border-radius: 8px; background: white; cursor: pointer; font-weight: 500; font-size: 14px; }
    .btn-type:hover { border-color: #667eea; background: #f5f5ff; }
    .btn-type.sel { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; }
    button { padding: 14px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; width: 100%; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .conv { background: #f9f9f9; border-radius: 12px; padding: 20px; margin-bottom: 20px; max-height: 500px; overflow-y: auto; }
    .msg { margin-bottom: 15px; }
    .msg.you { text-align: right; }
    .msg.you .txt { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 12px 4px 12px 12px; }
    .msg.ai .txt { background: white; color: #333; border: 2px solid #e0e0e0; border-radius: 4px 12px 12px 12px; }
    .msg .txt { display: inline-block; max-width: 80%; padding: 12px 16px; line-height: 1.6; font-size: 14px; word-wrap: break-word; }
    .msg .lbl { font-size: 12px; color: #999; margin-bottom: 4px; }
    .hide { display: none !important; }
    textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; min-height: 100px; margin-bottom: 20px; }
    textarea:focus { outline: none; border-color: #667eea; }
    .btns { display: flex; gap: 12px; }
    .btns button { flex: 1; }
    .btn-sec { background: #f0f0f0; color: #333; }
    .err { background: #fee; border: 1px solid #fcc; color: #c33; padding: 12px; border-radius: 8px; margin-bottom: 20px; display: none; }
    .spin { display: inline-block; width: 30px; height: 30px; border: 4px solid #e0e0e0; border-top-color: #667eea; border-radius: 50%; animation: s 0.8s linear infinite; }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <button class="lang-btn" onclick="toggleLang()"><span id="langtext">العربية</span></button>
    <div class="card">
      <div class="header">
        <h1>SUITCASE AI</h1>
        <p>Your AI-Powered Marketing Strategy Coach</p>
      </div>
      <div class="content">
        <!-- SELECT STAGE -->
        <div id="selectstage">
          <div class="section">
            <h2>What's your business type?</h2>
            <div class="grid">
              <button class="btn-type" onclick="selBiz('retail')">Retail</button>
              <button class="btn-type" onclick="selBiz('coffee')">Coffee</button>
              <button class="btn-type" onclick="selBiz('bakery')">Bakery</button>
              <button class="btn-type" onclick="selBiz('food')">Restaurant</button>
              <button class="btn-type" onclick="selBiz('services')">Services</button>
              <button class="btn-type" onclick="selBiz('other')">Other</button>
            </div>
          </div>
          <div class="section">
            <h2>Business size?</h2>
            <div class="grid">
              <button class="btn-type" onclick="selSize('small')">Small</button>
              <button class="btn-type" onclick="selSize('medium')">Medium</button>
            </div>
          </div>
          <button id="startbtn" onclick="startChat()" disabled>Start Strategy Session</button>
        </div>

        <!-- CHAT STAGE -->
        <div id="chatstage" class="hide">
          <div id="err" class="err"></div>
          <div class="conv" id="conv"></div>
          <textarea id="inp" placeholder="Your message..." onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
          <div class="btns">
            <button onclick="sendMsg()">Send</button>
            <button class="btn-sec" onclick="newSession()">New Session</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let biz = '', size = '', lang = 'en';
    const sid = 'sid-' + Date.now();

    function toggleLang() {
      lang = lang === 'en' ? 'ar' : 'en';
      document.getElementById('langtext').textContent = lang === 'en' ? 'العربية' : 'English';
    }

    function selBiz(b) {
      biz = b;
      document.querySelectorAll('[onclick*="selBiz"]').forEach(btn => btn.classList.remove('sel'));
      event.target.classList.add('sel');
      chk();
    }

    function selSize(s) {
      size = s;
      document.querySelectorAll('[onclick*="selSize"]').forEach(btn => btn.classList.remove('sel'));
      event.target.classList.add('sel');
      chk();
    }

    function chk() {
      document.getElementById('startbtn').disabled = !biz || !size;
    }

    function startChat() {
      document.getElementById('selectstage').classList.add('hide');
      document.getElementById('chatstage').classList.remove('hide');
      addMsg('SUITCASE AI', 'Tell me about your business and your current marketing efforts.');
    }

    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'msg ' + (role === 'You' ? 'you' : 'ai');
      div.innerHTML = `<div class="lbl">${role}</div><div class="txt">${text}</div>`;
      document.getElementById('conv').appendChild(div);
      document.getElementById('conv').scrollTop = document.getElementById('conv').scrollHeight;
    }

    function sendMsg() {
      const msg = document.getElementById('inp').value.trim();
      if (!msg) return;

      addMsg('You', msg);
      document.getElementById('inp').value = '';
      document.getElementById('inp').disabled = true;

      const load = document.createElement('div');
      load.className = 'msg ai';
      load.id = 'loading';
      load.innerHTML = '<div style="text-align:center;padding:20px;"><div class="spin"></div></div>';
      document.getElementById('conv').appendChild(load);
      document.getElementById('conv').scrollTop = document.getElementById('conv').scrollHeight;

      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          businessType: biz,
          businessSize: size,
          message: msg,
          sessionId: sid,
          language: lang
        })
      })
      .then(r => r.json())
      .then(d => {
        const loading = document.getElementById('loading');
        if (loading) loading.remove();
        if (d.success) {
          addMsg('SUITCASE AI', d.message);
        } else {
          document.getElementById('err').textContent = 'Error: ' + (d.error || 'Unknown error');
          document.getElementById('err').style.display = 'block';
        }
        document.getElementById('inp').disabled = false;
      })
      .catch(e => {
        const loading = document.getElementById('loading');
        if (loading) loading.remove();
        document.getElementById('err').textContent = 'Connection error: ' + e.message;
        document.getElementById('err').style.display = 'block';
        document.getElementById('inp').disabled = false;
      });
    }

    function newSession() {
      document.getElementById('selectstage').classList.remove('hide');
      document.getElementById('chatstage').classList.add('hide');
      document.getElementById('conv').innerHTML = '';
      document.getElementById('inp').value = '';
      biz = '';
      size = '';
      chk();
      document.querySelectorAll('.btn-type').forEach(btn => btn.classList.remove('sel'));
    }
  </script>
</body>
</html>
