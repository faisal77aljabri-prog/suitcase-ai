<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SUITCASE AI - Marketing Strategy for Small Businesses</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px 30px;
      text-align: center;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
    }

    .language-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      color: #667eea;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .language-toggle:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .content {
      padding: 40px;
    }

    .form-section {
      margin-bottom: 30px;
    }

    .form-section h2 {
      font-size: 20px;
      color: #333;
      margin-bottom: 15px;
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
      font-size: 14px;
    }

    select,
    input[type="text"],
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    select:focus,
    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      flex: 1;
      padding: 14px 24px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      border: 2px solid #ddd;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
    }

    .conversation {
      background: #f9f9f9;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      max-height: 400px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 15px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      text-align: right;
    }

    .message.user .text {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 12px 4px 12px 12px;
    }

    .message.assistant .text {
      background: white;
      color: #333;
      border: 2px solid #e0e0e0;
      border-radius: 4px 12px 12px 12px;
    }

    .message .text {
      display: inline-block;
      max-width: 80%;
      padding: 12px 16px;
      line-height: 1.6;
      font-size: 14px;
    }

    .message .label {
      font-size: 12px;
      color: #999;
      margin-bottom: 4px;
    }

    .stage {
      display: none;
    }

    .stage.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .business-types {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .type-button {
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      font-size: 14px;
    }

    .type-button:hover {
      border-color: #667eea;
      background: #f5f5ff;
    }

    .type-button.selected {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: transparent;
    }

    .loading {
      text-align: center;
      padding: 20px;
    }

    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 4px solid #e0e0e0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error {
      background: #fee;
      border: 1px solid #fcc;
      color: #c33;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .success {
      background: #efe;
      border: 1px solid #cfc;
      color: #3c3;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 20px;
      }

      .message .text {
        max-width: 95%;
      }

      .button-group {
        flex-direction: column;
      }

      .business-types {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const translations = {
      en: {
        title: "SUITCASE AI",
        subtitle: "Your AI-Powered Marketing Strategy Coach",
        selectBusiness: "What's your business type?",
        selectSize: "What's your business size?",
        smallBusiness: "Small",
        mediumBusiness: "Medium",
        retail: "Retail Shop",
        coffeShop: "Coffee Shop",
        bakery: "Bakery/Sweets",
        foodBusiness: "Restaurant/Food",
        services: "Services",
        other: "Other",
        startChat: "Start Strategy Session",
        askQuestion: "Ask a question...",
        send: "Send",
        exportPDF: "Export as PDF",
        newSession: "New Session",
        loading: "SUITCASE AI is thinking...",
        error: "Something went wrong. Please try again.",
        welcome: "Welcome to SUITCASE AI!",
        askInitial: "Tell me about your business and your current marketing efforts.",
      },
      ar: {
        title: "SUITCASE AI",
        subtitle: "مدرب استراتيجية التسويق المدعوم بالذكاء الاصطناعي",
        selectBusiness: "ما نوع عملك؟",
        selectSize: "حجم عملك؟",
        smallBusiness: "صغير",
        mediumBusiness: "متوسط",
        retail: "متجر بيع بالتجزئة",
        coffeShop: "متجر قهوة",
        bakery: "مخبز/حلويات",
        foodBusiness: "مطعم/طعام",
        services: "خدمات",
        other: "أخرى",
        startChat: "ابدأ جلسة الاستراتيجية",
        askQuestion: "اسأل سؤالاً...",
        send: "إرسال",
        exportPDF: "تصدير كـ PDF",
        newSession: "جلسة جديدة",
        loading: "يفكر SUITCASE AI...",
        error: "حدث خطأ ما. يرجى المحاولة مرة أخرى.",
        welcome: "مرحباً بك في SUITCASE AI!",
        askInitial: "أخبرني عن عملك وجهودك التسويقية الحالية.",
      },
    };

    function SuitcaseAI() {
      const [language, setLanguage] = useState("en");
      const [stage, setStage] = useState("select");
      const [businessType, setBusinessType] = useState("");
      const [businessSize, setBusinessSize] = useState("");
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [sessionId] = useState("session-" + Date.now());
      const [error, setError] = useState("");
      const conversationRef = useRef(null);

      const t = translations[language];

      const businessTypes = [
        { id: "retail", label: t.retail },
        { id: "coffee", label: t.coffeShop },
        { id: "bakery", label: t.bakery },
        { id: "food", label: t.foodBusiness },
        { id: "services", label: t.services },
        { id: "other", label: t.other },
      ];

      const businessSizes = [
        { id: "small", label: t.smallBusiness },
        { id: "medium", label: t.mediumBusiness },
      ];

      const startChat = () => {
        if (!businessType || !businessSize) return;
        setStage("chat");
        setMessages([
          {
            role: "assistant",
            content: t.askInitial,
          },
        ]);
        setError("");
      };

      const sendMessage = async () => {
        if (!input.trim()) return;

        const userMessage = input;
        setInput("");
        setMessages((prev) => [
          ...prev,
          { role: "user", content: userMessage },
        ]);
        setLoading(true);
        setError("");

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              businessType,
              businessSize,
              message: userMessage,
              sessionId,
              language,
            }),
          });

          const data = await response.json();

          if (data.success) {
            setMessages((prev) => [
              ...prev,
              { role: "assistant", content: data.message },
            ]);
          } else {
            setError(t.error);
          }
        } catch (err) {
          setError(t.error);
          console.error("Error:", err);
        } finally {
          setLoading(false);
        }
      };

      const exportPDF = () => {
        const content = messages
          .map(
            (m) => `${m.role === "user" ? "You" : "SUITCASE AI"}:\n${m.content}`
          )
          .join("\n\n---\n\n");

        const element = document.createElement("a");
        element.setAttribute(
          "href",
          "data:text/plain;charset=utf-8," + encodeURIComponent(content)
        );
        element.setAttribute("download", "marketing-strategy.txt");
        element.style.display = "none";
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
      };

      useEffect(() => {
        if (conversationRef.current) {
          conversationRef.current.scrollTop =
            conversationRef.current.scrollHeight;
        }
      }, [messages]);

      return (
        <div className="container">
          <button
            className="language-toggle"
            onClick={() => setLanguage(language === "en" ? "ar" : "en")}
          >
            {language === "en" ? "العربية" : "English"}
          </button>

          <div className="card">
            <div className="header">
              <h1>{t.title}</h1>
              <p>{t.subtitle}</p>
            </div>

            <div className="content">
              <div
                className={`stage ${stage === "select" ? "active" : ""}`}
              >
                <div className="form-section">
                  <h2>{t.selectBusiness}</h2>
                  <div className="business-types">
                    {businessTypes.map((type) => (
                      <button
                        key={type.id}
                        className={`type-button ${
                          businessType === type.id ? "selected" : ""
                        }`}
                        onClick={() => setBusinessType(type.id)}
                      >
                        {type.label}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="form-section">
                  <h2>{t.selectSize}</h2>
                  <div className="business-types">
                    {businessSizes.map((size) => (
                      <button
                        key={size.id}
                        className={`type-button ${
                          businessSize === size.id ? "selected" : ""
                        }`}
                        onClick={() => setBusinessSize(size.id)}
                      >
                        {size.label}
                      </button>
                    ))}
                  </div>
                </div>

                <div className="button-group">
                  <button
                    className="btn-primary"
                    onClick={startChat}
                    disabled={!businessType || !businessSize}
                  >
                    {t.startChat}
                  </button>
                </div>
              </div>

              <div className={`stage ${stage === "chat" ? "active" : ""}`}>
                {error && <div className="error">{error}</div>}

                <div className="conversation" ref={conversationRef}>
                  {messages.map((msg, idx) => (
                    <div key={idx} className={`message ${msg.role}`}>
                      <div className="label">
                        {msg.role === "user"
                          ? "You"
                          : "SUITCASE AI"}
                      </div>
                      <div className="text">
                        {msg.content}
                      </div>
                    </div>
                  ))}
                  {loading && (
                    <div className="message assistant">
                      <div className="loading">
                        <div className="spinner"></div>
                        <p style={{ marginTop: "10px" }}>
                          {t.loading}
                        </p>
                      </div>
                    </div>
                  )}
                </div>

                <div className="form-group" style={{ marginTop: "20px" }}>
                  <textarea
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyPress={(e) => {
                      if (
                        e.key === "Enter" &&
                        !e.shiftKey &&
                        !loading
                      ) {
                        e.preventDefault();
                        sendMessage();
                      }
                    }}
                    placeholder={t.askQuestion}
                    disabled={loading}
                  />
                </div>

                <div className="button-group">
                  <button
                    className="btn-primary"
                    onClick={sendMessage}
                    disabled={loading || !input.trim()}
                  >
                    {t.send}
                  </button>
                  <button
                    className="btn-secondary"
                    onClick={exportPDF}
                    disabled={messages.length === 0}
                  >
                    {t.exportPDF}
                  </button>
                  <button
                    className="btn-secondary"
                    onClick={() => {
                      setStage("select");
                      setMessages([]);
                      setInput("");
                      setBusinessType("");
                      setBusinessSize("");
                    }}
                  >
                    {t.newSession}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<SuitcaseAI />, document.getElementById("root"));
  </script>
</body>
</html>
